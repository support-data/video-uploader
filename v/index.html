<!DOCTYPE html>
<html>
<head>
  <title>Watch Video</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background: #0f172a;
      color: white;
      text-align: center;
      font-family: Arial;
      padding: 30px;
    }

    video {
      width: 90%;
      max-width: 700px;
      border-radius: 12px;
    }

    .ad-banner img {
      max-width: 100%;
      border-radius: 10px;
      margin: 15px 0;
    }

    .popup-ad {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .popup-box {
      background: white;
      padding: 25px;
      border-radius: 12px;
      color: black;
    }
  </style>
</head>
<body>

<!-- Banner Atas -->
<div class="ad-banner">
  <a href="https://www.effectivegatecpm.com/v3qki5mm?key=8672796a24e515329ada170ef16ab317"
     target="_blank">
    <img src="https://via.placeholder.com/728x90?text=ADVERTISEMENT">
  </a>
</div>

<h2>Video Player</h2>

<video id="videoPlayer" controls></video>

<!-- Banner Bawah -->
<div class="ad-banner">
  <a href="https://www.effectivegatecpm.com/v3qki5mm?key=8672796a24e515329ada170ef16ab317"
     target="_blank">
    <img src="https://via.placeholder.com/728x90?text=SUPPORT+US">
  </a>
</div>

<!-- Popup -->
<div id="popupAd" class="popup-ad">
  <div class="popup-box">
    <h3>Support Website</h3>
    <p>Klik sponsor untuk mendukung kami</p>
    <a href="https://www.effectivegatecpm.com/v3qki5mm?key=8672796a24e515329ada170ef16ab317"
       target="_blank">Kunjungi Sponsor</a>
    <br><br>
    <button onclick="closePopup()">Tutup</button>
  </div>
</div>

<script>
const videoPlayer = document.getElementById("videoPlayer");
const id = window.location.pathname.split("/").pop();

videoPlayer.src = "/uploads/" + id + ".mp4";

function closePopup() {
  document.getElementById("popupAd").style.display = "none";
}

// IKLAN TRIGGER SAAT PLAY
let adTriggered = false;

videoPlayer.addEventListener("play", function() {
  if (!adTriggered) {
    adTriggered = true;
    window.open(
      "https://www.effectivegatecpm.com/v3qki5mm?key=8672796a24e515329ada170ef16ab317",
      "_blank"
    );
  }
});
</script>

</body>
</html>
